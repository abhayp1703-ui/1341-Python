<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
        integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="boot-style.css">
</head>

<body>
    <div class="container h-100">
    <div class="row justify-content-center align-items-center min-vh-100 py-5">
        <div class="col-md-6 col-lg-5">
            <!-- Sign Up Card -->
            <div class="card signup-card border-0 rounded-lg">
                <div class="card-body p-5">
                    <h3 class="text-center font-weight-bold mb-4">Create Account</h3>
                    
                    <form action="#" method="POST" class="needs-validation" novalidate>
                        
                        <!-- Full Name Field -->
                        <div class="form-group mb-3">
                            <label for="fullName" class="small font-weight-bold text-muted">Full Name</label>
                            <input type="text" class="form-control" id="fullName" placeholder="Your username" required>
                            <div class="invalid-feedback">Please enter your name.</div>
                        </div>

                        <!-- Email Field -->
                        <div class="form-group mb-3">
                            <label for="email" class="small font-weight-bold text-muted">Email Address</label>
                            <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                            <div class="invalid-feedback">Please enter a valid email.</div>
                        </div>

                        <!-- Password Field -->
                        <div class="form-group mb-3">
                            <label for="password" class="small font-weight-bold text-muted">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="Min. 8 characters" minlength="8" required>
                            <div class="invalid-feedback">Password must be at least 8 characters.</div>
                        </div>

                        <!-- Terms & Conditions Checkbox -->
                        <div class="form-group form-check mb-4">
                            <input type="checkbox" class="form-check-input" id="terms" required>
                            <label class="form-check-label small text-muted" for="terms">
                                I agree to the <a href="#" class="text-primary">Terms & Conditions</a>
                            </label>
                            <div class="invalid-feedback text-left">You must agree before submitting.</div>
                        </div>

                        <!-- Submit Button -->
                        <a href="boot2.html" class="btn btn-primary btn-block font-weight-bold py-2 shadow-sm">
                            Sign Up
                        </a>
                    </form>
                    
                </div>
                <!-- Card Footer (Redirect to Login) -->
                <div class="card-footer bg-white border-0 text-center pb-4">
                    <p class="small text-muted mb-0">
                        Already have an account? <a href="#" class="text-primary font-weight-bold">Log In</a>
                    </p>
                </div>
            </div>
            <!-- End Sign Up Card -->
        </div>
    </div>
</div>
</body>

</html>
